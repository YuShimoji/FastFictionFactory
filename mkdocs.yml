site_name: Fast Fiction Factory
site_description: Local-first fiction production workbench documentation
docs_dir: docs
site_dir: build/mkdocs-site

theme:
  name: material
  language: ja
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.snippets:
      base_path: .
      check_paths: true
  - pymdownx.superfences

exclude_docs: |
  .git/**
  .serena/**
  node_modules/**
  dist/**
  build/**
  .venv/**
  venv/**
  __pycache__/**
  public/**
  tools/**
  artifacts/*.json
  artifacts/*.png
  artifacts/*.jpg
  artifacts/*.jpeg
  artifacts/*.webp
  artifacts/*.gif
  artifacts/*.html
  *.json
  *.png
  *.jpg
  *.jpeg
  *.webp
  *.gif
  *.html

nav:
  - 現在地:
      - Docs Home: index.md
      - Current Status: review/current-status.md
      - Project Overview: project-overview.md
  - 製品:
      - Project Context: project-context.md
      - Product Brief: product-brief.md
      - Product and Development Workflow: workflow.md
      - Data Model: data-model.md
      - QA Gates: qa-gates.md
  - 開発:
      - Active Idea Ledger: idea-ledger.md
      - Decision Log: decision-log.md
      - Next Terminal Handoff: review/next-terminal-handoff.md
  - 現行レビュー:
      - Workbench Component Contract: review/review-workbench-component-contract.md
      - Applied Decision Shell: review/apply-decision-shell-guard-diet.md
      - Layout Visual Audit: review/layout-lab-visual-audit.md
      - Draft-to-Video Bridge: review/draft-to-video-planning-bridge.md
      - Contradictory Claim Guard: review/contradictory-claim-guard.md
  - 履歴と根拠:
      - Artifact Inventory: local-view/artifacts.md
      - Repo Instructions: local-view/agents.md
      - Sample Story Memo: local-view/sample-story-memo.md
